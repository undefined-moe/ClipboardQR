name: Build

on:
  push:
    branches: [master]
    tags: ['v*']
  pull_request:
    branches: [master]

permissions:
  contents: read

jobs:
  build:
    name: ${{ matrix.goos }}/${{ matrix.goarch }}
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
          - os: windows-latest
            goos: windows
            goarch: amd64
          - os: macos-latest
            goos: darwin
            goarch: arm64

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install Linux dependencies
        if: matrix.goos == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libx11-dev libgtk-3-dev libayatana-appindicator3-dev

      - name: Build
        env:
          CGO_ENABLED: '1'
        run: |
          mkdir -p dist
          go build -trimpath -ldflags="-s -w" -o dist/ ./cmd/clipboardqr

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: clipboardqr-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/
