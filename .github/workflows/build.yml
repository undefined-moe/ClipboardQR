name: Build

on:
  push:
    branches: [master]
    tags: ['v*']
  pull_request:
    branches: [master]

permissions:
  contents: read

jobs:
  build:
    name: ${{ matrix.goos }}/${{ matrix.goarch }}
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
            binary: clipboardqr-linux-amd64
          - os: windows-latest
            goos: windows
            goarch: amd64
            binary: clipboardqr-windows-amd64.exe
          - os: macos-latest
            goos: darwin
            goarch: arm64
            binary: clipboardqr-darwin-arm64

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install Linux dependencies
        if: matrix.goos == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libx11-dev libgtk-3-dev libayatana-appindicator3-dev upx

      - name: Install UPX (Windows)
        if: matrix.goos == 'windows'
        shell: powershell
        run: choco install upx -y

      - name: Build
        env:
          CGO_ENABLED: '1'
        run: |
          mkdir -p dist
          LDFLAGS="-s -w"
          if [[ "${{ matrix.goos }}" == "windows" ]]; then
            LDFLAGS="$LDFLAGS -H windowsgui"
          fi
          go build -trimpath -ldflags="$LDFLAGS" -o dist/${{ matrix.binary }} ./cmd/clipboardqr

      - name: Compress with UPX
        if: matrix.goos != 'darwin'
        run: upx --best dist/${{ matrix.binary }}

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: clipboardqr-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/${{ matrix.binary }}
          archive: false
